<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>循环心理暗示工具</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
  <link rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
</head>
<body>
<div id="starFlash">⭐</div>

<!-- 主菜单 -->
<div id="mainMenu" class="screen active">
    <div class="menu">
        <h1 onclick="showAddDeckModal()" class="secondary">Cyclic Psychology Player</h1>
        <div class="bubbles" id="bubbles"></div>
    </div>
</div>

<!-- 播放器 -->
<div id="player" class="screen">
    <div class="topbar">
        <span id="deckTitle" onclick="backToMenu();" style="font-weight:600;"></span>
        <div id="weightBadge" class="weight-badge" style="margin-left:auto;"></div>
        <span id="counter">1 / 1</span>
    </div>

    
    <div class="player-layout">
        <div class="container">
            <div class="card" onclick="if(!isMobileDevice()) nextCard()">
                <div class="front" id="frontContainer">
                    <div class="front-content" id="front"></div>
                </div>
            </div>
        </div>
    </div>

   <!-- 更多按钮 --> <div class="card-toolbar">
        <button id="moreBtn" onclick="toggleMenu()">⋯</button>
    </div>
</div>

<!-- 底部菜单 -->
<div id="moreMenu" class="more-menu">
          <button id="editCardBtn" onclick="editCurrentCard();closeMenu()"><span class="icon">✏️</span>Edit</button>
    <button id="moveCardBtn" onclick="moveCurrentCard();closeMenu()"><span class="icon">📂</span>Move</button>

    <button onclick="showAddCardModal();closeMenu()"><span class="icon">➕</span>Add</button>
    <button id="deleteCardBtn" onclick="deleteCurrentCard();closeMenu()"><span class="icon">🗑️</span>Delete</button>

        <button id="masteredBtn" onclick="markMastered()"><span class="icon">⭐</span>Less-</button>
        <button id="importantBtn" onclick="markImportant()"><span class="icon">⭐</span>More+</button>

        <button onclick="prevCard();closeMenu()"><span class="icon">⬅</span>Previous</button>
        <button onclick="nextCard();closeMenu()"><span class="icon">➡</span>Next</button>
  
    <input type="file" id="csvInput" accept=".csv,.txt,.tsv" style="display:none" onchange="importCSV(event)">
    <button onclick="openImportModal();closeMenu()"><span class="icon">📥</span>Import</button>
    <div style="display: flex;">
        <button class="secondary" id="autoBtn" onclick="toggleAuto();closeMenu()"><span class="icon">▶</span> AutoPlay</button>
        <input style="display:none;" type="number" id="intervalInput" value="2.5" min="5" style="width:45px;background:#262b36;color:white;border:none;border-radius:8px;padding:8px;">
    </div>
  
    <button onclick="backToMenu();closeMenu()"><span class="icon">↩</span>Exit</button>
    <button onclick="toggleImmersiveMode();closeMenu()"><span class="icon">⛶</span>Immersive</button>
</div>

<!-- 弹窗 -->
<div id="deckModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">新建分类</h3>
        <input type="text" id="deckName" placeholder="🐱分类名称" style="width:100%;padding:12px;margin:15px 0;background:#262b36;color:white;border:none;border-radius:10px;">
        <input type="text" id="deckIcon" placeholder="📌图标" maxlength="2" style="width:100%;padding:12px;background:#262b36;color:white;border:none;border-radius:10px;">
        <div style="margin-top:20px;text-align:right;">
            <button onclick="hideDeckModal()" class="secondary">取消</button>
            <button onclick="saveDeck()" id="saveBtn">创建</button>
        </div>
    </div>
</div>

<div id="addCardModal" class="modal">
    <div class="modal-content">

    <div class="modal-title-row">
        <h3 id="cardModalTitle">添加新卡片</h3>
        <select id="cardDeckSelect"></select>
    </div>

        <div class="mini-toolbar">
            <button type="button"
                class="tool-btn red"
                onclick="wrapSelection('!!','!!')">
                🔴
            </button>

            <button type="button"
                class="tool-btn mark-highlight"
                onclick="wrapSelection('{{','}}')">
                🟨
            </button>

            <button type="button"
                class="tool-btn font-size"
                onclick="wrapSelection('[[',']]')">
                ᴀA
            </button>

            <button type="button"
                class="tool-btn bold"
                onclick="wrapSelection('**','**')">
                B
            </button>

            <button type="button"
                class="tool-btn underline"
                onclick="wrapSelection('__','__')">
                U
            </button>

            <button type="button"
                class="tool-btn clean"
                onclick="cleanTextarea(activeTextarea)">
                ✂️
            </button>
            <button
                type="button"
                class="tool-btn list"
                onclick="wrapSelection('- ','')">
              •
            </button>
            <button
                type="button"
                class="tool-btn list"
                onclick="insertOrderedList()">
                1.
            </button>
        </div>

        <textarea id="newFront" rows="10" onfocus="activeTextarea='newFront'" placeholder="输入卡片内容...">
        </textarea>
      
        <div class="modal-buttons">

            <button
                class="primary-btn"
                id="saveCardBtn"
                onclick="saveCard()">

                ✔️

            </button>

            <button
                class="secondary-btn"
                onclick="hideAddCardModal()">

                ❌

            </button>

        </div>

    </div>
</div>

<div id="moveCardModal" class="modal">
    <div class="modal-content">
        <h3>移动卡片到其它分类</h3>
        <select id="moveDeckSelect" style="width:100%;padding:12px;margin-top:20px;background:#262b36;color:white;border:none;border-radius:10px;font-size:16px;"></select>
        <div style="margin-top:20px;text-align:right;">
            <button onclick="hideMoveCardModal()" class="secondary">取消</button>
            <button onclick="confirmMoveCard()">移动</button>
        </div>
    </div>
</div>


<div id="importModal" class="modal">
    <div class="modal-content">

        <h3>批量导入卡片</h3>

        <textarea
            id="importText"
            placeholder="一行一张卡片&#10;&#10;例如：&#10;记得喝水😊&#10;站起来活动一下&#10;保护颈椎"
            rows="15"></textarea>

        <div class="import-tip">
            自动去重 · 自动过滤空行
        </div>

        <div class="modal-buttons">
            <button class="primary-btn"
                    onclick="confirmImport()">
                ✔️
            </button>

            <button class="secondary-btn"
                    onclick="closeImportModal()">
                ❌
            </button>
        </div>

    </div>
</div>
  
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script src="script.js"></script>
</body>
</html>
