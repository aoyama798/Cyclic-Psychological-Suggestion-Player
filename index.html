<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>循环暗示 - 心理重塑工具</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">



</head>
  <div id="starFlash">⭐</div>
<body>

<!-- 主菜单 -->
<div id="mainMenu" class="screen active">
    <div class="menu">
        <h1>循环暗示 - 心理重塑工具</h1>
        <div class="bubbles" id="bubbles"></div>
        <div style="margin-top:60px;">
            <button onclick="showAddDeckModal()" class="secondary">+ 新建分类</button>
        </div>
    </div>
</div>

<!-- 播放器 -->
<div id="player" class="screen">
    <div class="topbar">

        <button onclick="backToMenu()">← 返回</button>
        <button onclick="prevCard()">上一张</button>
      
        <button onclick="nextCard()">下一张</button>
        <button class="secondary" id="autoBtn" onclick="toggleAuto()">Play</button>

      <span>间隔(秒)</span>
        <input type="number" id="intervalInput" value="2.5" min="5" style="width:70px;background:#262b36;color:white;border:none;border-radius:8px;padding:8px;">
        
        <button
    onclick="document.getElementById('csvInput').click()"
    class="secondary"
>
    📥 批量导入
</button>
      <div id="breathingLight"></div>
<input
    type="file"
    id="csvInput"
    accept=".csv,.txt,.tsv"
    style="display:none"
    onchange="importCSV(event)"
>
        
        <span id="deckTitle" style="margin-left:auto;font-weight:600;"></span>
        <span id="counter">1 / 1</span>
    </div>
    <div class="container">
        <div class="card" onclick="handleCardAction()">
            
            <div class="front" id="front"></div>
            <div class="back" id="back"></div>
            <div class="progress" id="progress"></div>
          <div id="weightBadge" class="weight-badge"></div>
        </div>
    </div>
  
<div class="card-toolbar">

    <button id="editCardBtn" onclick="editCurrentCard()">✏️</button>

    <button id="deleteCardBtn" onclick="deleteCurrentCard()">🗑️</button>

    <button id="moveCardBtn" onclick="moveCurrentCard()">📂</button>
    
    <button id="masteredBtn" onclick="markMastered()">⭐-</button>
    <button id="importantBtn" onclick="markImportant()"> ⭐+</button>
    <button onclick="showAddCardModal()">➕</button>

</div>

  
    
</div>

<!-- 分类 新建/编辑 弹窗 -->
<div id="deckModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">新建分类</h3>
        <input type="text" id="deckName" placeholder="分类名称" style="width:100%;padding:12px;margin:15px 0;background:#262b36;color:white;border:none;border-radius:10px;">
        <input type="text" id="deckIcon" placeholder="图标（如 🧠）" maxlength="2" style="width:100%;padding:12px;background:#262b36;color:white;border:none;border-radius:10px;">
        <div style="margin-top:20px;text-align:right;">
            <button onclick="hideDeckModal()" class="secondary">取消</button>
            <button onclick="saveDeck()" id="saveBtn">创建</button>
        </div>
    </div>
</div>

<!-- 添加单张卡片弹窗 -->
<div id="addCardModal" class="modal">
    <div class="modal-content">
        <h3 id="cardModalTitle">添加新卡片</h3>
        <textarea id="newFront" placeholder="正面（问题/暗示）" style="width:100%;height:120px;margin:15px 0;padding:12px;background:#262b36;color:white;border:none;border-radius:12px;"></textarea>
        <textarea id="newBack" placeholder="背面（答案/解释）" style="width:100%;height:160px;padding:12px;background:#262b36;color:white;border:none;border-radius:12px;"></textarea>
        <div style="margin-top:20px;text-align:right;">
            <button onclick="hideAddCardModal()" class="secondary">取消</button>
            <button onclick="saveCard()" id="saveCardBtn">保存卡片</button>
        </div>
    </div>
</div>
<!-- 移动卡片弹窗 -->
<div id="moveCardModal" class="modal">
    <div class="modal-content">
        <h3>移动卡片到其它分类</h3>

        <select id="moveDeckSelect"
        style="
        width:100%;
        padding:12px;
        margin-top:20px;
        background:#262b36;
        color:white;
        border:none;
        border-radius:10px;
        font-size:16px;
        ">
        </select>

        <div style="margin-top:20px;text-align:right;">
            <button onclick="hideMoveCardModal()" class="secondary">取消</button>
            <button onclick="confirmMoveCard()">移动</button>
        </div>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
    
</body>
</html>
